<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TTT Settings</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f9fc;
        --panel: #ffffff;
        --text: #0f172a;
        --muted: #5b6472;
        --border: rgba(15, 23, 42, 0.12);
        --accent: #1d9bf0;
        --accent-2: #0f7cc4;
      }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 24px;
        background: linear-gradient(180deg, #eef5ff 0%, var(--bg) 180px);
        color: var(--text);
      }
      .shell { max-width: 1100px; margin: 0 auto; }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
        overflow: hidden;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: center;
        padding: 24px 24px 18px;
      }
      .eyebrow {
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      h1 { margin: 0 0 8px; font-size: 30px; }
      p { color: var(--muted); line-height: 1.5; margin: 0; }
      .divider { height: 1px; background: var(--border); }
      .layout {
        display: grid;
        grid-template-columns: 240px minmax(0, 1fr);
        gap: 24px;
        padding: 24px;
      }
      .sidebar {
        position: sticky;
        top: 24px;
        align-self: start;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: #fafcff;
        padding: 16px;
      }
      .sidebar h2 { margin: 0 0 10px; font-size: 16px; }
      .sidebar nav { display: grid; gap: 8px; }
      .sidebar a {
        color: var(--text);
        text-decoration: none;
        font-weight: 600;
        padding: 10px 12px;
        border-radius: 12px;
        background: #fff;
        border: 1px solid var(--border);
      }
      .sidebar a:hover { border-color: rgba(29, 155, 240, 0.35); color: var(--accent); }
      .main { min-width: 0; }
      label { display: block; margin: 18px 0 8px; font-weight: 700; }
      input[type="text"], input[type="password"] {
        width: 100%; box-sizing: border-box; padding: 12px 14px; font-size: 16px;
        border-radius: 12px; border: 1px solid var(--border); background: #fff; color: var(--text);
      }
      input:focus { outline: 2px solid rgba(29, 155, 240, 0.22); border-color: var(--accent); }
      .row { margin-top: 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
      button {
        padding: 11px 16px; border: 0; border-radius: 999px;
        background: linear-gradient(180deg, var(--accent), var(--accent-2));
        color: white; font-weight: 700; cursor: pointer; box-shadow: 0 8px 20px rgba(29, 155, 240, 0.25);
      }
      button:hover { filter: brightness(1.02); }
      button:disabled { opacity: 0.7; cursor: progress; }
      #status { color: var(--muted); }
      .hint { margin-top: 10px; font-size: 13px; color: var(--muted); }
      code { background: #eef2ff; border: 1px solid rgba(99, 102, 241, 0.14); padding: 1px 6px; border-radius: 999px; }
      .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
      .section { padding: 16px; border: 1px solid var(--border); border-radius: 16px; background: #fcfdff; }
      .section h2 { margin: 0 0 8px; font-size: 18px; }
      .section + .section { margin-top: 12px; }
      @media (max-width: 860px) {
        .layout { grid-template-columns: 1fr; }
        .sidebar { position: static; }
      }
    </style>
    <script type="module" src="./index.ts"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
